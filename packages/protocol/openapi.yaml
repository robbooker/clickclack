openapi: 3.1.0
info:
  title: ClickClack API
  version: 0.1.0
  license:
    name: MIT
servers:
  - url: http://localhost:8080
paths:
  /api/auth/magic/request:
    post:
      operationId: requestMagicLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestMagicLinkRequest"
      responses:
        "201":
          description: Created local magic-link token in dev-bootstrap mode
        "403":
          description: Dev-bootstrap token minting requires a loopback client and local request host
        "501":
          description: Magic-link delivery is not configured
  /api/auth/magic/consume:
    post:
      operationId: consumeMagicLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumeMagicLinkRequest"
      responses:
        "200":
          description: Created session
  /api/auth/github/start:
    get:
      operationId: startGitHubOAuth
      responses:
        "302":
          description: Redirect to GitHub OAuth authorization
        "501":
          description: GitHub OAuth not configured
  /api/auth/github/callback:
    get:
      operationId: finishGitHubOAuth
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Session created and redirected to app
        "400":
          description: Invalid OAuth callback
        "403":
          description: GitHub account is not allowed
  /api/me:
    get:
      operationId: getMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
  /api/workspaces:
    get:
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspace list
    post:
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace
  /api/routes/{workspace_route_id}/{target_route_id}:
    get:
      operationId: resolveRoute
      parameters:
        - $ref: "#/components/parameters/workspace_route_id"
        - $ref: "#/components/parameters/target_route_id"
      responses:
        "200":
          description: Resolved route target and canonical public URL path
          content:
            application/json:
              schema:
                type: object
                required: [route]
                properties:
                  route:
                    $ref: "#/components/schemas/RouteTarget"
        "404":
          description: Route was missing or inaccessible
  /api/workspaces/{workspace_id}:
    get:
      operationId: getWorkspace
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Workspace
  /api/workspaces/{workspace_id}/channels:
    get:
      operationId: listChannels
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Channel list
    post:
      operationId: createChannel
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Created channel
  /api/channels/{channel_id}:
    patch:
      operationId: updateChannel
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          description: Updated channel
  /api/channels/{channel_id}/messages:
    get:
      operationId: listMessages
      parameters:
        - $ref: "#/components/parameters/channel_id"
        - name: after_seq
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Root channel messages
    post:
      operationId: createMessage
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Existing message returned for an idempotent nonce replay
        "201":
          description: Created message
  /api/channels/{channel_id}/read:
    post:
      operationId: markChannelRead
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadRequest"
      responses:
        "200":
          description: Updated channel read receipt
  /api/messages/{message_id}:
    get:
      operationId: getMessage
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: Message visible to the current user
    patch:
      operationId: updateMessage
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Updated message
    delete:
      operationId: deleteMessage
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: Soft-deleted message
  /api/messages/{message_id}/thread:
    get:
      operationId: getThread
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: Thread root and replies
  /api/messages/{message_id}/thread/replies:
    post:
      operationId: createThreadReply
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Existing thread reply returned for an idempotent nonce replay
        "201":
          description: Created thread reply
  /api/messages/{message_id}/reactions:
    post:
      operationId: addReaction
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReactionRequest"
      responses:
        "200":
          description: Reaction already existed; no event created
        "201":
          description: Added reaction
  /api/messages/{message_id}/attachments:
    post:
      operationId: attachUpload
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachUploadRequest"
      responses:
        "200":
          description: Attached upload to message
  /api/messages/{message_id}/reactions/{emoji}:
    delete:
      operationId: removeReaction
      parameters:
        - $ref: "#/components/parameters/message_id"
        - name: emoji
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed reaction
  /api/realtime/events:
    get:
      operationId: listEvents
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: after_cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Durable events after cursor
  /api/realtime/ephemeral:
    post:
      operationId: publishEphemeral
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EphemeralEventRequest"
      responses:
        "202":
          description: Ephemeral event accepted
  /api/realtime/ws:
    get:
      operationId: realtimeWebSocket
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: after_cursor
          in: query
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade
  /api/search:
    get:
      operationId: search
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: channel_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results
  /api/uploads:
    post:
      operationId: createUpload
      parameters:
        - name: workspace_id
          in: query
          description: Optional workspace id for multipart clients that cannot send fields before the file part. If omitted, workspace_id must be included as a form field before file.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                workspace_id:
                  type: string
                  description: Workspace id. Required when the workspace_id query parameter is omitted.
                file:
                  type: string
                  format: binary
                width:
                  type: integer
                  minimum: 0
                height:
                  type: integer
                  minimum: 0
                duration_ms:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Created upload
  /api/uploads/{upload_id}:
    get:
      operationId: getUpload
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload bytes
  /api/dms:
    get:
      operationId: listDirectConversations
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DM list
    post:
      operationId: createDirectConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectConversationRequest"
      responses:
        "201":
          description: Created DM
  /api/dms/{conversation_id}/messages:
    get:
      operationId: listDirectMessages
      parameters:
        - $ref: "#/components/parameters/conversation_id"
        - name: after_seq
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Direct messages
    post:
      operationId: createDirectMessage
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Existing direct message returned for an idempotent nonce replay
        "201":
          description: Created direct message
  /api/dms/{conversation_id}/read:
    post:
      operationId: markDirectRead
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadRequest"
      responses:
        "200":
          description: Updated direct-conversation read receipt
  /api/hooks/mattermost/{channel_id}:
    post:
      operationId: mattermostIncomingWebhook
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MattermostWebhookRequest"
      responses:
        "201":
          description: Created message from incoming webhook
  /api/hooks/slash/{channel_id}:
    post:
      operationId: slashCommand
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SlashCommandRequest"
      responses:
        "201":
          description: Slash-command callback response
components:
  parameters:
    workspace_id:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
    channel_id:
      name: channel_id
      in: path
      required: true
      schema:
        type: string
    message_id:
      name: message_id
      in: path
      required: true
      schema:
        type: string
    conversation_id:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    workspace_route_id:
      name: workspace_route_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^(T[A-Z0-9]{16}|wsp_[A-Za-z0-9-]+)$"
    target_route_id:
      name: target_route_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^([CDM][A-Z0-9]{16}|(chn|dm|msg)_[A-Za-z0-9-]+)$"
  schemas:
    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
    RequestMagicLinkRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
    ConsumeMagicLinkRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    UpdateMeRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          maxLength: 80
        handle:
          type: string
          description: Unique user handle. Accepts an optional leading @ and stores the normalized value without it.
          pattern: "^[a-zA-Z0-9@][a-zA-Z0-9_-]{1,32}$"
        avatar_url:
          type: string
          format: uri
        notification_settings:
          $ref: "#/components/schemas/NotificationSettings"
    User:
      type: object
      required: [id, kind, display_name, handle, avatar_url, created_at]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [human, bot]
          description: Human users sign in directly. Bot users authenticate with bot tokens and may be service-owned or owned by a human.
        owner_user_id:
          type: string
          description: Human owner for a user-owned bot. Empty for humans and service bots.
        display_name:
          type: string
        handle:
          type: string
        avatar_url:
          type: string
        created_at:
          type: string
          format: date-time
        notification_settings:
          $ref: "#/components/schemas/NotificationSettings"
    NotificationSettings:
      type: object
      required: [pushover_enabled, pushover_user_key]
      properties:
        pushover_enabled:
          type: boolean
        pushover_user_key:
          type: string
          description: Current user's Pushover user key. Must be set when Pushover notifications are enabled.
          pattern: "^[A-Za-z0-9]{30}$"
    CreateChannelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        kind:
          type: string
          default: public
    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
        archived:
          type: boolean
    CreateMessageRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
        body_format:
          type: string
          enum: [markdown]
          default: markdown
        quoted_message_id:
          type: string
          description: |
            Optional ID of a message to quote. The quoted message must live in
            the same channel, DM conversation, or thread as the new message;
            cross-context quoting is rejected with 400. The server captures a
            soft snapshot of the quoted body at send time.
        nonce:
          type: string
          maxLength: 128
          description: |
            Optional client idempotency key for retry-safe message creation.
            Reusing the same nonce with the same body and quote returns the
            existing message with HTTP 200 instead of creating a duplicate.
    MarkReadRequest:
      type: object
      required: [seq]
      properties:
        seq:
          type: integer
          format: int64
          minimum: 0
          description: Last visible channel or DM sequence to mark as read.
    ReadReceipt:
      type: object
      required: [scope_id, user_id, last_read_seq, last_read_at]
      properties:
        scope_id:
          type: string
        user_id:
          type: string
        last_read_seq:
          type: integer
          format: int64
        last_read_at:
          type: string
          format: date-time
    Workspace:
      type: object
      required: [id, route_id, name, slug, created_at]
      properties:
        id:
          type: string
        route_id:
          type: string
          description: Immutable public route ID used in app URLs.
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
    Channel:
      type: object
      required: [id, route_id, workspace_id, name, kind, created_at]
      properties:
        id:
          type: string
        route_id:
          type: string
          description: Immutable public route ID used in app URLs.
        workspace_id:
          type: string
        name:
          type: string
        kind:
          type: string
        created_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
        last_seq:
          type: integer
          format: int64
        last_read_seq:
          type: integer
          format: int64
        unread_count:
          type: integer
          format: int64
    DirectConversation:
      type: object
      required: [id, route_id, workspace_id, created_at, members]
      properties:
        id:
          type: string
        route_id:
          type: string
          description: Immutable public route ID used in app URLs.
        workspace_id:
          type: string
        created_at:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        last_seq:
          type: integer
          format: int64
        last_read_seq:
          type: integer
          format: int64
        unread_count:
          type: integer
          format: int64
    Message:
      type: object
      required: [id, workspace_id, author_id, thread_root_id, body, body_format, created_at]
      properties:
        id:
          type: string
        route_id:
          type: string
          description: Immutable public route ID for thread roots. Omitted when the message has no route.
        workspace_id:
          type: string
        channel_id:
          type: string
        direct_conversation_id:
          type: string
        author_id:
          type: string
        parent_message_id:
          type: string
        thread_root_id:
          type: string
        channel_seq:
          type: integer
          format: int64
        thread_seq:
          type: integer
          format: int64
        body:
          type: string
        body_format:
          type: string
          enum: [markdown]
        created_at:
          type: string
          format: date-time
        edited_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/User"
        quoted_message_id:
          type: string
        quoted_body_snapshot:
          type: string
        quoted_author_id:
          type: string
        quoted_author:
          $ref: "#/components/schemas/User"
        nonce:
          type: string
    RouteTarget:
      type: object
      required: [workspace_id, workspace_route_id, target_type, target_id, target_route_id, canonical_path]
      properties:
        workspace_id:
          type: string
        workspace_route_id:
          type: string
        target_type:
          type: string
          enum: [channel, direct, thread]
        target_id:
          type: string
        target_route_id:
          type: string
        parent_type:
          type: string
          enum: [channel, direct]
        parent_id:
          type: string
        parent_route_id:
          type: string
        canonical_path:
          type: string
    AddReactionRequest:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
    AttachUploadRequest:
      type: object
      required: [upload_id]
      properties:
        upload_id:
          type: string
    CreateDirectConversationRequest:
      type: object
      required: [workspace_id, member_ids]
      properties:
        workspace_id:
          type: string
        member_ids:
          type: array
          items:
            type: string
    EphemeralEventRequest:
      type: object
      required: [workspace_id, type]
      properties:
        workspace_id:
          type: string
        channel_id:
          type: string
        direct_conversation_id:
          type: string
        type:
          type: string
          enum: [typing.started, typing.stopped, presence.changed]
        payload:
          type: object
          additionalProperties: true
    MattermostWebhookRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
    SlashCommandRequest:
      type: object
      properties:
        command:
          type: string
        text:
          type: string
        user_name:
          type: string
