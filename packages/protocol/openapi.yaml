openapi: 3.1.0
info:
  title: ClickClack API
  version: 0.1.0
  license:
    name: MIT
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Process liveness
      security: []
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
  /readyz:
    get:
      operationId: getReadiness
      summary: Database readiness
      security: []
      responses:
        "200":
          description: Database is reachable
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ready
        "503":
          description: Database is unavailable; internal error details are omitted
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: unavailable
  /metrics:
    get:
      operationId: getMetrics
      summary: Opt-in metadata-only Prometheus metrics
      security: []
      responses:
        "200":
          description: Prometheus text exposition when metrics are enabled
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Metrics are disabled
  /api/auth/magic/request:
    post:
      operationId: requestMagicLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestMagicLinkRequest"
      responses:
        "201":
          description: Created local magic-link token in dev-bootstrap mode
        "403":
          description: Dev-bootstrap token minting requires a loopback client and local request host
        "501":
          description: Magic-link delivery is not configured
  /api/auth/magic/consume:
    post:
      operationId: consumeMagicLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumeMagicLinkRequest"
      responses:
        "200":
          description: Created session
  /api/auth/github/start:
    get:
      operationId: startGitHubOAuth
      responses:
        "302":
          description: Redirect to GitHub OAuth authorization
        "400":
          description: Ambiguous OAuth browser-binding cookies
        "429":
          description: Deployment edge rate limit exceeded, when configured
        "500":
          description: OAuth browser binding, state, PKCE generation, or persistence failed
        "501":
          description: GitHub OAuth not configured
        "503":
          description: OAuth transaction capacity exhausted or canonical callback origin unavailable
  /api/auth/github/desktop/start:
    get:
      operationId: startDesktopGitHubOAuth
      parameters:
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
            minLength: 43
            maxLength: 43
            pattern: "^[A-Za-z0-9_-]+$"
        - name: desktop_protocol
          in: query
          required: false
          description: Desktop OAuth handoff version. Omitted clients use legacy protocol 1.
          schema:
            type: integer
            enum: [1, 2]
      responses:
        "302":
          description: Redirect the system browser to GitHub OAuth authorization
        "400":
          description: Invalid desktop code challenge, unsupported protocol, or ambiguous OAuth browser-binding cookies
        "426":
          description: Desktop app upgrade required before a namespaced server can begin authentication
        "429":
          description: Deployment edge rate limit exceeded, when configured
        "500":
          description: OAuth browser binding, state, PKCE generation, or persistence failed
        "501":
          description: GitHub OAuth not configured
        "503":
          description: OAuth transaction capacity exhausted or canonical callback origin unavailable
  /api/auth/github/desktop/consume:
    post:
      operationId: consumeDesktopGitHubOAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumeDesktopGitHubOAuthRequest"
      responses:
        "200":
          description: One-time desktop grant consumed and session cookie created
        "400":
          description: Malformed request or invalid, expired, or previously consumed desktop grant
        "403":
          description: Cross-site redemption rejected
        "413":
          description: JSON request body exceeds the application limit
        "415":
          description: Request content type is not application/json
        "429":
          description: Deployment edge rate limit exceeded, when configured
        "500":
          description: Desktop grant consumption or session persistence failed
  /api/auth/github/callback:
    get:
      operationId: finishGitHubOAuth
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Browser session created and redirected to the web app, or one-time desktop grant created and redirected to the desktop callback
        "400":
          description: Invalid OAuth callback
        "403":
          description: GitHub account is not allowed
        "500":
          description: Identity, workspace, session, or desktop grant generation or persistence failed
        "502":
          description: GitHub provider request failed
        "503":
          description: Desktop grant capacity exhausted or canonical callback origin unavailable
  /api/me:
    get:
      operationId: getMe
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
    patch:
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
  /api/me/bots:
    get:
      operationId: listMyBots
      responses:
        "200":
          description: User-owned bots installed in workspaces
          content:
            application/json:
              schema:
                type: object
                required: [bots]
                properties:
                  bots:
                    type: array
                    items:
                      $ref: "#/components/schemas/OwnedBotEntry"
        "403":
          description: Bot tokens cannot list owned bots
  /api/workspaces:
    get:
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspace list
    post:
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace
  /api/routes/{workspace_route_id}/{target_route_id}:
    get:
      operationId: resolveRoute
      parameters:
        - $ref: "#/components/parameters/workspace_route_id"
        - $ref: "#/components/parameters/target_route_id"
      responses:
        "200":
          description: Resolved route target and canonical public URL path
          content:
            application/json:
              schema:
                type: object
                required: [route]
                properties:
                  route:
                    $ref: "#/components/schemas/RouteTarget"
        "404":
          description: Route was missing or inaccessible
  /api/workspaces/{workspace_id}:
    get:
      operationId: getWorkspace
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Workspace
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
    patch:
      operationId: updateWorkspace
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace profile
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
                  event:
                    type: object
        "403":
          description: Workspace manager permission required
    delete:
      operationId: deleteWorkspace
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "204":
          description: Workspace metadata deleted; queued upload-object cleanup may continue asynchronously
        "403":
          description: Workspace owner permission required
  /api/workspaces/{workspace_id}/transfer-ownership:
    post:
      operationId: transferWorkspaceOwnership
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferWorkspaceOwnershipRequest"
      responses:
        "200":
          description: Workspace ownership transferred
          content:
            application/json:
              schema:
                type: object
                required: [workspace]
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
                  event:
                    type: object
        "403":
          description: Workspace owner permission required
  /api/workspaces/{workspace_id}/members:
    get:
      operationId: listWorkspaceMembers
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: cursor
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [owner, moderator, member, bot, guest]
      responses:
        "200":
          description: Paginated workspace members visible to any workspace member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberPage"
  /api/workspaces/{workspace_id}/moderation/members:
    get:
      operationId: listWorkspaceMembersForModeration
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Workspace members with moderation state
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemberModeration"
  /api/workspaces/{workspace_id}/moderation/members/{user_id}:
    patch:
      operationId: updateWorkspaceMemberModeration
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberModerationRequest"
      responses:
        "200":
          description: Updated member moderation state
          content:
            application/json:
              schema:
                type: object
                required: [member]
                properties:
                  member:
                    $ref: "#/components/schemas/MemberModeration"
                  event:
                    type: object
  /api/workspaces/{workspace_id}/channels:
    get:
      operationId: listChannels
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Channel list
    post:
      operationId: createChannel
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Created channel
  /api/workspaces/{workspace_id}/topics:
    get:
      operationId: listTopics
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Workspace topics
    post:
      operationId: createTopic
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicRequest"
      responses:
        "201":
          description: Created topic
  /api/workspaces/{workspace_id}/bots:
    get:
      operationId: listBots
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Workspace bot identities and redacted tokens
          content:
            application/json:
              schema:
                type: object
                required: [bots]
                properties:
                  bots:
                    type: array
                    items:
                      $ref: "#/components/schemas/BotWithTokens"
    post:
      operationId: createBot
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotRequest"
      responses:
        "201":
          description: Created bot and one-time raw bot token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotResponse"
        "403":
          description: Service bots require a workspace manager. User-owned bots must be created by their owner.
  /api/workspaces/{workspace_id}/bots/{bot_user_id}/membership:
    delete:
      operationId: removeBotFromWorkspace
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - name: bot_user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Bot removed from workspace and workspace-scoped tokens revoked
        "403":
          description: Workspace manager permission required
        "404":
          description: Bot membership not found
  /api/workspaces/{workspace_id}/bots/{bot_user_id}/tokens:
    get:
      operationId: listWorkspaceBotTokens
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - name: bot_user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Redacted workspace-scoped bot tokens
          content:
            application/json:
              schema:
                type: object
                required: [bot_tokens]
                properties:
                  bot_tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/BotToken"
        "403":
          description: Workspace membership required
    post:
      operationId: createWorkspaceBotToken
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - name: bot_user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotTokenRequest"
      responses:
        "201":
          description: Created one-time raw workspace-scoped bot token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotTokenResponse"
        "403":
          description: Service bot tokens require a workspace manager. User-owned bot tokens require the bot owner.
  /api/bots/{bot_user_id}/tokens:
    get:
      operationId: listBotTokens
      parameters:
        - name: bot_user_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Redacted bot tokens for bots installed in exactly one workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotTokenListResponse"
        "403":
          description: Workspace membership required
    post:
      operationId: createBotToken
      parameters:
        - name: bot_user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotTokenRequest"
      responses:
        "201":
          description: Created one-time raw bot token for bots installed in exactly one workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotTokenResponse"
        "403":
          description: Service bot tokens require a workspace manager. User-owned bot tokens require the bot owner.
  /api/bot-tokens/{token_id}/revoke:
    post:
      operationId: revokeBotToken
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked bot token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotTokenResponse"
        "403":
          description: Service bot tokens require a workspace manager. User-owned bot tokens require the bot owner.
  /api/workspaces/{workspace_id}/app-installations:
    get:
      operationId: listAppInstallations
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Active app installations for a workspace
    post:
      operationId: createAppInstallation
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppInstallationRequest"
      responses:
        "201":
          description: Installed app binding
  /api/app-installations/{installation_id}/revoke:
    post:
      operationId: revokeAppInstallation
      parameters:
        - name: installation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked app installation
  /api/workspaces/{workspace_id}/slash-commands:
    get:
      operationId: listSlashCommands
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Active registered slash commands
    post:
      operationId: createSlashCommand
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlashCommandRequest"
      responses:
        "201":
          description: Registered slash command and one-time signing secret
  /api/slash-commands/{command_id}/revoke:
    post:
      operationId: revokeSlashCommand
      parameters:
        - name: command_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked slash command
  /api/workspaces/{workspace_id}/event-subscriptions:
    get:
      operationId: listEventSubscriptions
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Active outgoing event subscriptions
    post:
      operationId: createEventSubscription
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventSubscriptionRequest"
      responses:
        "201":
          description: Created event subscription and one-time signing secret
  /api/event-subscriptions/{subscription_id}/revoke:
    post:
      operationId: revokeEventSubscription
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked event subscription
  /api/event-subscriptions/{subscription_id}/deliveries:
    get:
      operationId: listEventDeliveryAttempts
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event delivery attempts
  /api/workspaces/{workspace_id}/audit-log:
    get:
      operationId: listAuditLogEntries
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Workspace audit log entries
  /api/workspaces/{workspace_id}/connected-accounts:
    get:
      operationId: listConnectedAccounts
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      responses:
        "200":
          description: Active connected accounts
    post:
      operationId: createConnectedAccount
      parameters:
        - $ref: "#/components/parameters/workspace_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectedAccountRequest"
      responses:
        "201":
          description: Created connected account
  /api/connected-accounts/{account_id}/revoke:
    post:
      operationId: revokeConnectedAccount
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked connected account
  /api/channels/{channel_id}:
    patch:
      operationId: updateChannel
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          description: Updated channel
  /api/channels/{channel_id}/messages:
    get:
      operationId: listMessages
      parameters:
        - $ref: "#/components/parameters/channel_id"
        - name: after_seq
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Root channel messages
    post:
      operationId: createMessage
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageRequest"
      responses:
        "200":
          description: Existing message returned for an idempotent nonce replay
        "201":
          description: Created message
  /api/channels/{channel_id}/read:
    post:
      operationId: markChannelRead
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadRequest"
      responses:
        "200":
          description: Updated channel read receipt
  /api/messages/by-nonce:
    get:
      operationId: getMessageByNonce
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: nonce
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        "200":
          description: Message created by the authenticated owner with this nonce
          headers:
            X-ClickClack-Message-Nonce:
              description: Indicates that durable message nonce lookup is supported.
              schema:
                type: string
                enum: [supported]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: No message exists for this owner and nonce
          headers:
            X-ClickClack-Message-Nonce:
              description: Indicates that durable message nonce lookup is supported.
              schema:
                type: string
                enum: [supported]
        "409":
          description: The nonce belongs to a message in another workspace
  /api/messages/{message_id}:
    get:
      operationId: getMessage
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: Message visible to the current user
    patch:
      operationId: updateMessage
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Updated message
    delete:
      operationId: deleteMessage
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: Soft-deleted message
  /api/messages/{message_id}/thread:
    get:
      operationId: getThread
      parameters:
        - $ref: "#/components/parameters/message_id"
      responses:
        "200":
          description: Thread root and replies
  /api/messages/{message_id}/thread/replies:
    post:
      operationId: createThreadReply
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadReplyRequest"
      responses:
        "200":
          description: Existing thread reply returned for an idempotent nonce replay
        "201":
          description: Created thread reply
  /api/messages/{message_id}/reactions:
    post:
      operationId: addReaction
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReactionRequest"
      responses:
        "200":
          description: Reaction already existed; no event created
        "201":
          description: Added reaction
  /api/messages/{message_id}/attachments:
    post:
      operationId: attachUpload
      parameters:
        - $ref: "#/components/parameters/message_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachUploadRequest"
      responses:
        "200":
          description: Attached upload to message
  /api/messages/{message_id}/reactions/{emoji}:
    delete:
      operationId: removeReaction
      parameters:
        - $ref: "#/components/parameters/message_id"
        - name: emoji
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed reaction
  /api/realtime/events:
    get:
      operationId: listEvents
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: after_cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: include_tail
          in: query
          description: Include the latest durable cursor visible at request start.
          schema:
            type: boolean
      responses:
        "200":
          description: Durable events after cursor
  /api/realtime/ephemeral:
    post:
      operationId: publishEphemeral
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EphemeralEventRequest"
      responses:
        "202":
          description: Ephemeral event accepted
  /api/realtime/ws:
    get:
      operationId: realtimeWebSocket
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: after_cursor
          in: query
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade
  /api/search:
    get:
      operationId: search
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: channel_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results
  /api/uploads:
    post:
      operationId: createUpload
      parameters:
        - name: workspace_id
          in: query
          description: Optional workspace id for multipart clients that cannot send fields before the file part. If omitted, workspace_id must be included as a form field before file.
          schema:
            type: string
        - name: nonce
          in: query
          description: Optional idempotency nonce. Requires workspace_id in the query. Replays return the original upload without reading the multipart body.
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                workspace_id:
                  type: string
                  description: Workspace id. Required when the workspace_id query parameter is omitted.
                file:
                  type: string
                  format: binary
                width:
                  type: integer
                  minimum: 0
                height:
                  type: integer
                  minimum: 0
                duration_ms:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: Existing upload replayed by nonce
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "201":
          description: Created upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "409":
          description: The nonce belongs to an upload in another workspace
  /api/uploads/by-nonce:
    get:
      operationId: getUploadByNonce
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: nonce
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        "200":
          description: Upload metadata
          headers:
            X-ClickClack-Upload-Nonce:
              description: Indicates that durable upload nonce lookup is supported.
              schema:
                type: string
                enum: [supported]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "404":
          description: No upload exists for this nonce
          headers:
            X-ClickClack-Upload-Nonce:
              description: Indicates that durable upload nonce lookup is supported.
              schema:
                type: string
                enum: [supported]
        "409":
          description: The nonce belongs to an upload in another workspace
  /api/uploads/{upload_id}:
    get:
      operationId: getUpload
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload bytes
  /api/dms:
    get:
      operationId: listDirectConversations
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: DM list
    post:
      operationId: createDirectConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectConversationRequest"
      responses:
        "201":
          description: Created DM
  /api/dms/{conversation_id}:
    get:
      operationId: getDirectConversation
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      responses:
        "200":
          description: Direct conversation
    delete:
      operationId: hideDirectConversation
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      responses:
        "200":
          description: Closed direct conversation for the current user
  /api/dms/{conversation_id}/open:
    post:
      operationId: reopenDirectConversation
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      responses:
        "200":
          description: Reopened direct conversation for the current user
  /api/dms/{conversation_id}/messages:
    get:
      operationId: listDirectMessages
      parameters:
        - $ref: "#/components/parameters/conversation_id"
        - name: after_seq
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Direct messages
    post:
      operationId: createDirectMessage
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: Existing direct message returned for an idempotent nonce replay
        "201":
          description: Created direct message
  /api/dms/{conversation_id}/read:
    post:
      operationId: markDirectRead
      parameters:
        - $ref: "#/components/parameters/conversation_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadRequest"
      responses:
        "200":
          description: Updated direct-conversation read receipt
  /api/hooks/mattermost/{channel_id}:
    post:
      operationId: mattermostIncomingWebhook
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MattermostWebhookRequest"
      responses:
        "201":
          description: Created message from incoming webhook
  /api/hooks/slash/{channel_id}:
    post:
      operationId: slashCommand
      parameters:
        - $ref: "#/components/parameters/channel_id"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SlashCommandRequest"
      responses:
        "201":
          description: Slash-command callback response
components:
  parameters:
    workspace_id:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
    channel_id:
      name: channel_id
      in: path
      required: true
      schema:
        type: string
    message_id:
      name: message_id
      in: path
      required: true
      schema:
        type: string
    conversation_id:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    workspace_route_id:
      name: workspace_route_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^(T[A-Z0-9]{16}|wsp_[A-Za-z0-9-]+)$"
    target_route_id:
      name: target_route_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^([CDM][A-Z0-9]{16}|(chn|dm|msg)_[A-Za-z0-9-]+)$"
  schemas:
    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
    UpdateMemberModerationRequest:
      type: object
      properties:
        role:
          type: string
          enum: [moderator, member, guest]
        timeout_until:
          type: string
          format: date-time
        timeout_minutes:
          type: integer
        clear_timeout:
          type: boolean
        blocked:
          type: boolean
        moderation_note:
          type: string
    RequestMagicLinkRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
    ConsumeMagicLinkRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    ConsumeDesktopGitHubOAuthRequest:
      type: object
      required: [code, code_verifier]
      properties:
        code:
          description: Opaque one-time grant from a legacy protocol-1 or current protocol-2 desktop callback
          oneOf:
            - type: string
              title: Desktop OAuth protocol 1 grant
              minLength: 32
              maxLength: 32
              pattern: "^[a-f0-9]{32}$"
            - type: string
              title: Desktop OAuth protocol 2 grant
              minLength: 43
              maxLength: 43
              pattern: "^[A-Za-z0-9_-]{43}$"
        code_verifier:
          type: string
          minLength: 43
          maxLength: 128
          pattern: "^[A-Za-z0-9_-]+$"
    UpdateMeRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
          maxLength: 80
        handle:
          type: string
          description: Unique user handle. Accepts an optional leading @ and stores the normalized value without it.
          pattern: "^[a-zA-Z0-9@][a-zA-Z0-9_-]{1,32}$"
        avatar_url:
          type: string
          format: uri
        notification_settings:
          $ref: "#/components/schemas/NotificationSettings"
    User:
      type: object
      required: [id, kind, display_name, handle, avatar_url, created_at]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [human, bot]
          description: Human users sign in directly. Bot users authenticate with bot tokens and may be service-owned or owned by a human.
        owner_user_id:
          type: string
          description: Human owner for a user-owned bot. Empty for humans and service bots.
        display_name:
          type: string
        handle:
          type: string
        avatar_url:
          type: string
        created_at:
          type: string
          format: date-time
        notification_settings:
          $ref: "#/components/schemas/NotificationSettings"
    BotToken:
      type: object
      required: [id, bot_user_id, workspace_id, name, scopes, created_at]
      properties:
        id:
          type: string
        bot_user_id:
          type: string
        workspace_id:
          type: string
        owner_user_id:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
        token:
          type: string
          description: One-time raw ccb_ token. Present only immediately after creation.
    BotWithTokens:
      type: object
      required: [bot, tokens]
      properties:
        bot:
          $ref: "#/components/schemas/User"
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/BotToken"
    CreateBotResponse:
      type: object
      required: [bot, bot_token]
      properties:
        bot:
          $ref: "#/components/schemas/User"
        bot_token:
          $ref: "#/components/schemas/BotToken"
    BotTokenResponse:
      type: object
      required: [bot_token]
      properties:
        bot_token:
          $ref: "#/components/schemas/BotToken"
    BotTokenListResponse:
      type: object
      required: [bot_tokens]
      properties:
        bot_tokens:
          type: array
          items:
            $ref: "#/components/schemas/BotToken"
    OwnedBotWorkspace:
      type: object
      required: [id, route_id, name]
      properties:
        id:
          type: string
        route_id:
          type: string
        name:
          type: string
    OwnedBotEntry:
      type: object
      required: [bot, workspace, active_token_count]
      properties:
        bot:
          $ref: "#/components/schemas/User"
        workspace:
          $ref: "#/components/schemas/OwnedBotWorkspace"
        active_token_count:
          type: integer
          minimum: 0
    CreateBotRequest:
      type: object
      required: [display_name]
      properties:
        owner_user_id:
          type: string
        display_name:
          type: string
          maxLength: 80
        handle:
          type: string
        avatar_url:
          type: string
          format: uri
        token_name:
          type: string
        scopes:
          type: array
          items:
            type: string
    CreateBotTokenRequest:
      type: object
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
    AppInstallation:
      type: object
      required: [id, workspace_id, app_slug, display_name, bot_user_id, config, created_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        app_slug:
          type: string
        display_name:
          type: string
        bot_user_id:
          type: string
        config:
          type: object
          additionalProperties: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    CreateAppInstallationRequest:
      type: object
      required: [app_slug, bot_user_id]
      properties:
        app_slug:
          type: string
        display_name:
          type: string
          maxLength: 80
        bot_user_id:
          type: string
        config:
          type: object
          additionalProperties: true
    SlashCommand:
      type: object
      required: [id, workspace_id, command, description, callback_url, bot_user_id, created_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        app_installation_id:
          type: string
        command:
          type: string
          description: Slash command name, normalized with a leading slash.
        description:
          type: string
        callback_url:
          type: string
          format: uri
        signing_secret:
          type: string
          description: One-time callback signing secret. Present only immediately after registration.
        bot_user_id:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    CreateSlashCommandRequest:
      type: object
      required: [command, callback_url, bot_user_id]
      properties:
        app_installation_id:
          type: string
        command:
          type: string
        description:
          type: string
          maxLength: 500
        callback_url:
          type: string
          format: uri
        bot_user_id:
          type: string
    EventSubscription:
      type: object
      required: [id, workspace_id, event_types, callback_url, created_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        app_installation_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        callback_url:
          type: string
          format: uri
        signing_secret:
          type: string
          description: One-time callback signing secret. Present only immediately after creation.
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    CreateEventSubscriptionRequest:
      type: object
      required: [event_types, callback_url]
      properties:
        app_installation_id:
          type: string
        event_types:
          type: array
          items:
            type: string
        callback_url:
          type: string
          format: uri
    EventDeliveryAttempt:
      type: object
      required: [id, subscription_id, event_id, workspace_id, event_type, attempt, response_status, created_at, completed_at]
      properties:
        id:
          type: string
        subscription_id:
          type: string
        event_id:
          type: string
        workspace_id:
          type: string
        event_type:
          type: string
        attempt:
          type: integer
        request_json:
          type: string
        response_status:
          type: integer
        response_body:
          type: string
        error:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    AuditLogEntry:
      type: object
      required: [id, workspace_id, actor_user_id, action, target_type, target_id, metadata, created_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        actor_user_id:
          type: string
        action:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    ConnectedAccount:
      type: object
      required: [id, workspace_id, user_id, provider, provider_account_id, display_name, scopes, metadata, created_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        user_id:
          type: string
        provider:
          type: string
        provider_account_id:
          type: string
        display_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
    CreateConnectedAccountRequest:
      type: object
      required: [user_id, provider, provider_account_id]
      properties:
        user_id:
          type: string
        provider:
          type: string
        provider_account_id:
          type: string
        display_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
    NotificationSettings:
      type: object
      required: [pushover_enabled, pushover_user_key]
      properties:
        pushover_enabled:
          type: boolean
        pushover_user_key:
          type: string
          description: Current user's Pushover user key. Must be set when Pushover notifications are enabled.
          pattern: "^$|^[A-Za-z0-9]{30}$"
    CreateChannelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        kind:
          type: string
          default: public
    Topic:
      type: object
      required: [id, workspace_id, name, created_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        channel_id:
          type: string
        name:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
    CreateTopicRequest:
      type: object
      required: [name]
      properties:
        channel_id:
          type: string
        name:
          type: string
          maxLength: 80
    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string
        archived:
          type: boolean
    CreateMessageRequest:
      type: object
      description: A non-empty body or an upload_id is required.
      properties:
        body:
          type: string
        upload_id:
          type: string
          description: |
            Optional upload to attach atomically while creating the message.
            The upload must belong to the caller and the message workspace.
        body_format:
          type: string
          enum: [markdown]
          default: markdown
        quoted_message_id:
          type: string
          description: |
            Optional ID of a message to quote. The quoted message must live in
            the same channel, DM conversation, or thread as the new message;
            cross-context quoting is rejected with 400. The server captures a
            soft snapshot of the quoted body at send time.
        nonce:
          type: string
          maxLength: 128
          description: |
            Optional client idempotency key for retry-safe message creation.
            Reusing the same nonce with the same body and quote returns the
            existing message with HTTP 200 instead of creating a duplicate.
        topic_id:
          type: string
          description: Optional topic id. Channel-scoped topics can only be used in their channel.
        kind:
          type: string
          enum: [message, agent_commentary, agent_tool]
          description: |
            Durable message kind; omitted values default to message. Agent
            activity kinds require bot-token auth
            with the explicit agent_activity:write scope and are supported on
            channel and direct-message create endpoints.
        turn_id:
          type: string
          description: |
            Optional agent-turn correlation ID. Allowed only with
            agent_commentary or agent_tool; ordinary messages reject it.
    CreateThreadReplyRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
        quoted_message_id:
          type: string
        nonce:
          type: string
          maxLength: 128
    UpdateMessageRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
    MarkReadRequest:
      type: object
      required: [seq]
      properties:
        seq:
          type: integer
          format: int64
          minimum: 0
          description: Last visible channel or DM sequence to mark as read.
    ReadReceipt:
      type: object
      required: [scope_id, user_id, last_read_seq, last_read_at]
      properties:
        scope_id:
          type: string
        user_id:
          type: string
        last_read_seq:
          type: integer
          format: int64
        last_read_at:
          type: string
          format: date-time
    UpdateWorkspaceRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        slug:
          type: string
        icon_url:
          type: string
    TransferWorkspaceOwnershipRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
    Workspace:
      type: object
      required: [id, route_id, name, slug, icon_url, created_at]
      properties:
        id:
          type: string
        route_id:
          type: string
          description: Immutable public route ID used in app URLs.
        name:
          type: string
        slug:
          type: string
        icon_url:
          type: string
        created_at:
          type: string
          format: date-time
        role:
          type: string
          enum: [owner, moderator, member, guest, bot]
    WorkspaceMember:
      type: object
      required: [workspace_id, user, role, joined_at]
      properties:
        workspace_id:
          type: string
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
          enum: [owner, moderator, member, bot, guest]
        joined_at:
          type: string
          format: date-time
    WorkspaceMemberPage:
      type: object
      required: [members, has_more]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceMember"
        next_cursor:
          type: string
        has_more:
          type: boolean
        total_count:
          type: integer
          description: Exact filtered member count, included only on the first page.
        total_by_role:
          allOf:
            - $ref: "#/components/schemas/WorkspaceMemberRoleCounts"
          description: Exact unfiltered role totals, included only on the unfiltered first page.
    WorkspaceMemberRoleCounts:
      type: object
      required: [owner, moderator, member, bot, guest]
      properties:
        owner:
          type: integer
          minimum: 0
        moderator:
          type: integer
          minimum: 0
        member:
          type: integer
          minimum: 0
        bot:
          type: integer
          minimum: 0
        guest:
          type: integer
          minimum: 0
    MemberModeration:
      type: object
      required: [workspace_id, user, role, posts_remaining, post_limit]
      properties:
        workspace_id:
          type: string
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
          enum: [owner, moderator, member, guest, bot]
        posts_remaining:
          type: integer
        post_limit:
          type: integer
        timeout_until:
          type: string
          format: date-time
        blocked_at:
          type: string
          format: date-time
        moderation_note:
          type: string
        moderation_by:
          type: string
        moderation_at:
          type: string
          format: date-time
    Channel:
      type: object
      required: [id, route_id, workspace_id, name, kind, created_at]
      properties:
        id:
          type: string
        route_id:
          type: string
