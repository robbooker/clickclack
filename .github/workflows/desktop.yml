name: desktop

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.9.0"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Desktop
            os: macos-latest
            command: dist:mac
            artifact: ClickClack-macOS
            files: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
          - name: Windows Desktop
            os: windows-latest
            command: dist:win
            artifact: ClickClack-Windows
            files: |
              apps/desktop/release/*.exe
              apps/desktop/release/*.zip
          - name: Linux Desktop
            os: ubuntu-latest
            command: dist:linux
            artifact: ClickClack-Linux
            files: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test desktop contract
        run: pnpm test:desktop

      - name: Typecheck desktop
        run: pnpm --filter @clickclack/desktop typecheck

      - name: Package desktop app
        run: pnpm --filter @clickclack/desktop run ${{ matrix.command }}

      - name: Upload unsigned preview installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 7
