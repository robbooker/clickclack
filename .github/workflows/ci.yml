name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  PNPM_VERSION: "11.0.7"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check gofmt
        run: |
          files="$(gofmt -l apps/api)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Coverage gate
        run: |
          go test ./apps/api/internal/... -coverprofile=coverage.out
          grep -v '/storedb/' coverage.out > coverage.filtered.out
          go tool cover -func=coverage.filtered.out | tee coverage.txt
          awk '/^total:/ { sub(/%/, "", $3); if ($3 + 0 < 90) exit 1 }' coverage.txt

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript formatting
        run: pnpm fmt:ts:check

      - name: Lint TypeScript
        run: pnpm lint

      - name: Typecheck root tests
        run: pnpm typecheck

      - name: Typecheck workspaces
        run: pnpm -r typecheck

      - name: Verify embedded app build is current and repeatable
        run: |
          pnpm build
          git diff --exit-code -- apps/api/internal/webassets/dist
          pnpm build
          git diff --exit-code -- apps/api/internal/webassets/dist

      - name: Build docs site
        run: pnpm docs:site

  e2e:
    name: Playwright E2E
    needs:
      - go
      - typescript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Go modules
        run: go mod download

      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm test:e2e

  docker:
    name: Docker Image
    needs:
      - go
      - typescript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t clickclack:ci .
