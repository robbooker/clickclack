version: "2"
sql:
  - engine: sqlite
    schema: apps/api/internal/store/sqlite/sqlc/schema.sql
    queries: apps/api/internal/store/sqlite/sqlc/queries.sql
    gen:
      go:
        package: storedb
        out: apps/api/internal/store/sqlite/storedb
        sql_package: database/sql
        emit_json_tags: true
